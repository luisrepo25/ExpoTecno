worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs a stdout/stderr para que Render los capture
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Temp dirs con permisos para usuario no-root
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;

    server {
        listen 8080;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Assets compilados por Vite — cache agresivo
        location /build/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Storage público (fotos subidas localmente)
        location /storage/ {
            expires 7d;
            try_files $uri =404;
        }

        # Todas las rutas → index.php (SPA / Inertia)
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM
        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_read_timeout 60;
        }

        # Bloquear acceso a archivos ocultos
        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
